<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
  <h1>📊 Admin Dashboard</h1>
  <p style="text-align:center;">Live voting results</p>

  <div id="results"></div>

  <br>
  <a href="/logout">Logout</a>
</div>

<script>
fetch("/api/candidates")
  .then(res => res.json())
  .then(data => {
    const div = document.getElementById("results");

    data.forEach(c => {
      div.innerHTML += `
        <div class="candidate">
          <h3>${c.name}</h3>
          <p><strong>${c.votes}</strong> votes</p>
        </div>
      `;
    });
  });
</script>

</body>
</html>
